<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON Swap TRC20 → TRX</title>

    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .container {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #e50914;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 15px;
        }

        .info {
            background: #111;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .log {
            background: black;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            height: 260px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>TRON TRC20 → TRX Swap</h2>

    <button onclick="connectWallet()">
        🔗 Hubungkan Wallet
    </button>

    <div class="info">
        <div><b>Alamat:</b> <span id="wallet">Belum connect</span></div>
        <div><b>Network:</b> <span id="network">-</span></div>
    </div>

    <h3>Alamat Token TRC20</h3>

    <input
        id="tokenAddress"
        value="TXLAQ63Xg1NAzckPwKHvzw7CSEmLMEqcdj"
        placeholder="Masukkan alamat token TRC20"
    />

    <button onclick="getBalance()">
        💰 Cek Saldo
    </button>

    <div id="balanceInfo"></div>

    <button onclick="approveToken()">
        ✅ Approve Token
    </button>

    <input
        id="recipient"
        placeholder="Alamat tujuan TRON (contoh: T... )"
    />

    <input
        id="trxAmount"
        placeholder="Jumlah TRX yang ingin dikirim"
        type="number"
    />

    <button onclick="swapToken()">
        🚀 Swap Token ke TRX
    </button>

    <button onclick="sendTRX()">
        📤 Kirim TRX
    </button>

    <div class="log" id="log"></div>

</div>

<script>

    // SUNSWAP V2 ROUTER
    const ROUTER = "TKzxdSv2FZKQrEqkKVgp5DcwEXBEKMg2Ax";

    // WTRX
    const WTRX = "TNUC9Qb1rRpS5CbWLmNMxXBjyFoydXjWFR";

    let tronWeb;
    let userAddress;

    function log(message, error = false) {
        const el = document.getElementById("log");

        const color = error ? "#ff4444" : "#44ff44";

        el.innerHTML += `
            <div style="color:${color}">
                [${new Date().toLocaleTimeString()}] ${message}
            </div>
        `;

        el.scrollTop = el.scrollHeight;
    }

    async function connectWallet() {

        if (!window.tronWeb || !window.tronWeb.defaultAddress.base58) {
            alert("Buka halaman ini di TronLink atau browser DApp TRON.");
            return;
        }

        tronWeb = window.tronWeb;

        userAddress = tronWeb.defaultAddress.base58;

        document.getElementById("wallet").innerText =
            userAddress.slice(0, 6) + "..." + userAddress.slice(-4);

        document.getElementById("network").innerText =
            tronWeb.fullNode.host;

        log("Wallet berhasil terhubung");
    }

    async function getBalance() {

        try {

            const tokenAddress = document
                .getElementById("tokenAddress")
                .value
                .trim();

            const contract = await tronWeb.contract().at(tokenAddress);

            const balance = await contract
                .balanceOf(userAddress)
                .call();

            const decimals = await contract.decimals().call();

            const symbol = await contract.symbol().call();

            const formatted = Number(balance) / (10 ** decimals);

            document.getElementById("balanceInfo").innerHTML = `
                <b>${symbol}</b>: ${formatted}
            `;

            log(`Saldo ${symbol}: ${formatted}`);

        } catch (e) {
            log("Gagal cek saldo: " + e.message, true);
        }
    }

    async function approveToken() {

        try {

            const tokenAddress = document
                .getElementById("tokenAddress")
                .value
                .trim();

            const contract = await tronWeb.contract().at(tokenAddress);

            log("Mengirim approve...");

            const tx = await contract
                .approve(
                    ROUTER,
                    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
                )
                .send();

            log("Approve sukses: " + tx);

        } catch (e) {
            log("Approve gagal: " + e.message, true);
        }
    }

    async function swapToken() {

        try {

            const tokenAddress = document
                .getElementById("tokenAddress")
                .value
                .trim();

            const token = await tronWeb.contract().at(tokenAddress);

            const router = await tronWeb.contract().at(ROUTER);

            const balance = await token
                .balanceOf(userAddress)
                .call();

            if (Number(balance) <= 0) {
                log("Saldo kosong", true);
                return;
            }

            const path = [tokenAddress, WTRX];

            const deadline = Math.floor(Date.now() / 1000) + 60 * 10;

            log("Mengirim swap...");

            const tx = await router
                .swapExactTokensForETHSupportingFeeOnTransferTokens(
                    balance.toString(),
                    0,
                    path,
                    userAddress,
                    deadline
                )
                .send({
                    feeLimit: 200000000
                });

            log("Swap berhasil: " + tx);

        } catch (e) {
            log("Swap gagal: " + e.message, true);
        }
    }

    async function sendTRX() {

        try {

            const recipient = document
                .getElementById("recipient")
                .value
                .trim();

            const trxAmount = parseFloat(
                document.getElementById("trxAmount").value
            );

            if (!recipient) {
                log("Alamat tujuan kosong", true);
                return;
            }

            if (!trxAmount || trxAmount <= 0) {
                log("Jumlah TRX tidak valid", true);
                return;
            }

            const amountSun = tronWeb.toSun(trxAmount);

            log("Mengirim TRX...");

            const tx = await tronWeb.trx.sendTransaction(
                recipient,
                amountSun
            );

            log("TRX berhasil dikirim");
            log("TXID: " + tx.txid);

        } catch (e) {
            log("Gagal kirim TRX: " + e.message, true);
        }
    }

</script>

</body>
</html>
